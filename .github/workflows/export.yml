name: Export og Deploy til itch.io

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  export-web:
    name: Web Export
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - name: Sjekk ut kode
        uses: actions/checkout@v4
        with:
          lfs: true

      - name: Koble eksportmalar til riktig HOME-mappe
        run: |
          mkdir -p "$HOME/.local/share/godot/export_templates"
          ln -sfn /root/.local/share/godot/export_templates/4.3.stable \
            "$HOME/.local/share/godot/export_templates/4.3.stable"

      - name: Sett opp eksportmapper
        run: mkdir -v -p builds/

      - name: Importer prosjekt (bygg asset-cache)
        run: godot --headless --import || true

      - name: Eksporter til Web (HTML5)
        run: godot --headless --export-release "Web" ./builds/index.html

      - name: Last opp build-artefakt
        uses: actions/upload-artifact@v4
        with:
          name: rema-run-web
          path: builds/
          retention-days: 30

      - name: Deploy til itch.io
        uses: josephbmanley/butler-publish-itchio-action@master
        env:
          BUTLER_CREDENTIALS: ${{ secrets.BUTLER_API_KEY }}
          CHANNEL: html5
          ITCH_GAME: rema-run
          ITCH_USER: ${{ secrets.ITCH_USERNAME }}
          PACKAGE: ./builds/
          VERSION: ${{ github.run_number }}
